services:
  db:
    image: postgres:18
    container_name: vtb-pg
    environment:
      POSTGRES_USER: ${VTB_PG_USER}
      POSTGRES_PASSWORD: ${VTB_PG_PASSWORD}
      POSTGRES_DB: ${VTB_PG_DB}
    volumes:
      - ./pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VTB_PG_USER} -d ${VTB_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vtb-verein:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: vtb-verein:latest
    container_name: vtb-verein
    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      VTB_DATABASE_URL: postgresql://${VTB_PG_USER}:${VTB_PG_PASSWORD}@db:5432/${VTB_PG_DB}
      VTB_UPLOAD_PATH: /app/uploads

    ports:
      - "${VTB_PORT:-8000}:8000"

    volumes:
      - ./uploads:/app/uploads

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Hintergrund-Sync der Schließanlage (Inventar + IC-Karten + Logs, paarmal täglich).
  # Eigener Sidecar statt In-Process-Scheduler: kein Worker-Duplikations-Problem, robust
  # über die Restart-Policy. Nutzt dasselbe Image wie vtb-verein (kein zweiter Build).
  # Intervall über TTLOCK_SYNC_INTERVAL_HOURS (Default 6 = 4×/Tag). Läuft erst nach dem
  # App-Start (Migrationen), idle wenn kein TTLock-Konto konfiguriert ist.
  zutritt-sync:
    image: vtb-verein:latest
    container_name: vtb-zutritt-sync
    # Image bringt einen HEALTHCHECK auf den Webserver (Port 8000) mit (backend/Dockerfile).
    # Der Sidecar startet aber nur die Sync-Schleife, keinen Webserver → der vererbte Check
    # würde den Container dauerhaft fälschlich „unhealthy" stempeln. Daher hier abschalten.
    healthcheck:
      disable: true
    depends_on:
      vtb-verein:
        condition: service_healthy
    env_file:
      - .env
    environment:
      VTB_DATABASE_URL: postgresql://${VTB_PG_USER}:${VTB_PG_PASSWORD}@db:5432/${VTB_PG_DB}
    command: >
      sh -c '
      H="$${TTLOCK_SYNC_INTERVAL_HOURS:-6}";
      echo "[zutritt-sync] gestartet – Intervall $${H}h";
      while true; do
        python tools/zutritt_sync.py || echo "[zutritt-sync] Lauf fehlgeschlagen – Retry beim nächsten Intervall";
        sleep "$$(( H * 3600 ))";
      done'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Teamtresor-Beitragslauf (#98): bucht den fälligen Mannschaftsbeitrag je aktivem
  # Kader-Mitglied ohne Befreiung am Monatsersten nach. Idempotent (ein Monat nie
  # doppelt) → ein täglicher Tick genügt, um den 1. sicher zu erwischen. Gleicher
  # Sidecar-Ansatz wie zutritt-sync (kein In-Process-Scheduler, dasselbe Image).
  # Intervall über CLUBDECKEL_BEITRAG_INTERVAL_HOURS (Default 24 = 1×/Tag).
  clubdeckel-beitrag:
    image: vtb-verein:latest
    container_name: vtb-clubdeckel-beitrag
    healthcheck:
      disable: true
    depends_on:
      vtb-verein:
        condition: service_healthy
    env_file:
      - .env
    environment:
      VTB_DATABASE_URL: postgresql://${VTB_PG_USER}:${VTB_PG_PASSWORD}@db:5432/${VTB_PG_DB}
    command: >
      sh -c '
      H="$${CLUBDECKEL_BEITRAG_INTERVAL_HOURS:-24}";
      echo "[clubdeckel-beitrag] gestartet – Intervall $${H}h";
      while true; do
        python tools/clubdeckel_beitrag_lauf.py || echo "[clubdeckel-beitrag] Lauf fehlgeschlagen – Retry beim nächsten Intervall";
        sleep "$$(( H * 3600 ))";
      done'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

