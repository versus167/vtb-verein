services:
  db:
    image: postgres:18
    container_name: vtb-pg
    environment:
      POSTGRES_USER: ${VTB_PG_USER}
      POSTGRES_PASSWORD: ${VTB_PG_PASSWORD}
      POSTGRES_DB: ${VTB_PG_DB}
    volumes:
      - ./pg_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VTB_PG_USER} -d ${VTB_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vtb-verein:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vtb-verein
    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      VTB_DATABASE_URL: postgresql://${VTB_PG_USER}:${VTB_PG_PASSWORD}@db:5432/${VTB_PG_DB}

    ports:
      - "${VTB_PORT:-8000}:8000"

    volumes:
      - ./uploads:/app/uploads

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

